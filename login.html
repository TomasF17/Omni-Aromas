<!DOCTYPE html>
<html lang="pt">
<head>
   <meta charset="UTF-8">
   <meta http-equiv="X-UA-Compatible" content="IE=edge">
   <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
   <title>Omni Aromas - Entrar / Registar</title> 
   <link rel="shortcut icon" href="https://ik.imagekit.io/fsobpyaa5i/Omni%20Aromas%20(1).png">
   <link rel="stylesheet" href="assets/css/bootstrap.min.css">
   <link rel="stylesheet" href="assets/css/main.css"> 
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

   <style>
      /* Ajustes para garantir a estética Black & Gold da marca */
      .auth-container {
         min-height: 80vh;
         display: flex;
         align-items: center;
         justify-content: center;
      }
      .auth-card {
         background: rgba(24, 24, 24, 0.95);
         border: 1px solid var(--cusborder, #262525);
         border-radius: 16px;
         padding: 40px;
         width: 100%;
         max-width: 450px;
         box-shadow: 0px 6px 30px rgba(0, 0, 0, 0.5);
      }
      .auth-toggle-btn {
         background: transparent;
         border: none;
         color: var(--pra, #999);
         font-size: 16px;
         padding: 10px 20px;
         cursor: pointer;
         transition: all 0.3s;
         font-family: "Cinzel", sans-serif;
      }
      .auth-toggle-btn.active {
         color: var(--base, #FEC961);
         border-bottom: 2px solid var(--base, #FEC961);
         font-weight: 600;
      }
      .auth-form-group {
         margin-bottom: 20px;
         position: relative;
      }
      .auth-form-group input {
         width: 100%;
         padding: 12px 16px;
         background: #141410;
         border: 1px solid var(--border1, #414141);
         border-radius: 8px;
         color: var(--white, #fff);
         font-family: "Cinzel", sans-serif;
         transition: border-color 0.3s;
      }
      .auth-form-group input:focus {
         border-color: var(--base, #FEC961);
         outline: none;
      }
      .auth-btn {
         width: 100%;
         background: transparent;
         border: 1px solid var(--base, #FEC961);
         color: var(--white, #fff);
         padding: 14px;
         border-radius: 8px;
         font-weight: 600;
         text-transform: uppercase;
         letter-spacing: 0.05em;
         transition: all 0.3s;
         cursor: pointer;
      }
      .auth-btn:hover {
         background: var(--base, #FEC961);
         color: #141410;
         transform: translateY(-2px);
      }
      .form-section {
         display: none;
      }
      .form-section.active {
         display: block;
         animation: fadeIn 0.4s ease-in-out;
      }
      @keyframes fadeIn {
         from { opacity: 0; transform: translateY(10px); }
         to { opacity: 1; transform: translateY(0); }
      }
   </style>
</head>
<body>

<!--<< Header Simplificado >>-->
<header class="header-section" style="background: var(--body);">
   <div class="container">
      <div class="header-wrapper justify-content-center">
         <div class="main__logo">
            <a href="index.html" class="logo">
               <img src="https://ik.imagekit.io/mtrtszz/imagem_2026-06-15_112519617-removebg-preview.png?tr=c-at_max_enlarge,w-320,h-239" alt="Omni Aromas" style="max-height:90px;width:auto;">
            </a>
         </div>
      </div>
   </div>
</header>

<!--<< Área de Autenticação >>-->
<main class="container auth-container">
   <div class="auth-card">
      
      <!-- Abas de Alternância -->
      <div class="d-flex justify-content-center mb-4 border-bottom border-secondary">
         <button class="auth-toggle-btn active" id="btn-login" onclick="switchForm('login')">Entrar</button>
         <button class="auth-toggle-btn" id="btn-register" onclick="switchForm('register')">Criar Conta</button>
      </div>

      <!-- Formulário de Login -->
      <section id="section-login" class="form-section active">
         <h3 class="text-center fz-24 mb-4">Bem-vindo de volta</h3>
         <form action="login.php" method="POST">
            <div class="auth-form-group">
               <input type="email" name="email" placeholder="E-mail Corporativo / Pessoal" required>
            </div>
            <div class="auth-form-group">
               <input type="password" name="password" placeholder="Palavra-passe" required>
            </div>
            <div class="text-end mb-3">
               <a href="#0" class="base fz-14">Esqueceu-se da palavra-passe?</a>
            </div>
            <button type="submit" class="auth-btn">Iniciar Sessão</button>
         </form>
      </section>

      <!-- Formulário de Registo -->
      <section id="section-register" class="form-section">
         <h3 class="text-center fz-24 mb-4">Registar Espaço</h3>
         <form action="register.php" method="POST">
            <div class="auth-form-group">
               <input type="text" name="username" placeholder="Nome Completo / Empresa" required>
            </div>
            <div class="auth-form-group">
               <input type="email" name="email" placeholder="E-mail de Contacto" required>
            </div>
            <div class="auth-form-group">
               <input type="password" name="password" placeholder="Criar Palavra-passe" required>
            </div>
            <div class="auth-form-group">
               <input type="password" name="password_confirm" placeholder="Confirmar Palavra-passe" required>
            </div>
            <div class="form-check mb-4">
               <input class="form-check-input" type="checkbox" id="termsCheck" required style="width: auto; margin-right: 10px;">
               <label class="form-check-label fz-14 text-muted" for="termsCheck">
                  Aceito os <a href="#0" class="base">Termos & Condições</a>
               </label>
            </div>
            <button type="submit" class="auth-btn">Finalizar Registo</button>
         </form>
      </section>

   </div>
</main>

<footer class="footer__bottom cmn__bg text-center py-4">
   <p class="white fz-14 m-0">Copyright © 2026 <a href="index.html" class="base">Omni Aromas.</a> Todos os direitos reservados.</p>
</footer>

<!--<< JavaScript para Alternar Formulários >>-->
<script>
   function switchForm(type) {
      const loginSection = document.getElementById('section-login');
      const registerSection = document.getElementById('section-register');
      const loginBtn = document.getElementById('btn-login');
      const registerBtn = document.getElementById('btn-register');

      if (type === 'login') {
         loginSection.classList.add('active');
         registerSection.classList.remove('active');
         loginBtn.classList.add('active');
         registerBtn.classList.remove('active');
      } else {
         registerSection.classList.add('active');
         loginSection.classList.remove('active');
         registerBtn.classList.add('active');
         loginBtn.classList.remove('active');
      }
   }
</script>

</body>
</html>
